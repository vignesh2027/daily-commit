name: Daily Commit

on:
  schedule:
    - cron: '0 2 * * *'   # 7:30 AM IST
    - cron: '0 5 * * *'   # 10:30 AM IST
    - cron: '0 8 * * *'   # 1:30 PM IST
    - cron: '0 11 * * *'  # 4:30 PM IST
    - cron: '0 14 * * *'  # 7:30 PM IST
    - cron: '0 17 * * *'  # 10:30 PM IST
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Update timestamp
        run: |
          echo "Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > last_updated.txt

      - name: Commit and push
        run: |
          git config user.name "vignesh2027"
          git config user.email "applemacbook6sep2004@gmail.com"
          git add last_updated.txt
          git commit -m "chore: update $(date -u '+%Y-%m-%d %H:%M')"
          git push
