name: Daily Commit

on:
  schedule:
    - cron: '0 12 * * *'  # Runs every day at 12:00 UTC
  workflow_dispatch:       # Also allows manual trigger

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update timestamp
        run: |
          echo "Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > last_updated.txt

      - name: Commit and push
        run: |
          git config user.name "vignesh2027"
          git config user.email "applemacbook6sep2004@gmail.com"
          git add last_updated.txt
          git commit -m "chore: daily update $(date -u '+%Y-%m-%d')"
          git push
